services:
  drclaw:
    build: .
    container_name: drclaw
    ports:
      - "3200:3200"
    volumes:
      - ./data:/app/data
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - drclaw-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: drclaw-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - drclaw-net
    restart: unless-stopped

networks:
  drclaw-net:
    driver: bridge

volumes:
  qdrant_data:
