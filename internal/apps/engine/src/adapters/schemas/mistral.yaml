schema_version: 1

adapter:
  id: mistral
  name: Mistral AI
  version: "1.0.0"
  category: llm
  requires_key: true
  free_tier: true

auth:
  type: bearer
  key_url: https://console.mistral.ai/api-keys/

base_url: https://api.mistral.ai

endpoints:
  chat:
    method: POST
    path: /v1/chat/completions
    response_type: json
    body:
      model: "{{ model }}"
      messages: "{{ messages }}"
      temperature: "{{ temperature | default: 0.7 }}"
      max_tokens: "{{ max_tokens | default: 4096 }}"
      stream: false

  chat_stream:
    method: POST
    path: /v1/chat/completions
    response_type: sse
    body:
      model: "{{ model }}"
      messages: "{{ messages }}"
      temperature: "{{ temperature | default: 0.7 }}"
      max_tokens: "{{ max_tokens | default: 4096 }}"
      stream: true

  models:
    method: GET
    path: /v1/models
    response_type: json

capabilities:
  chat: true
  streaming: true
  embeddings: true
  images: false
  audio: false
  models:
    - id: mistral-large-latest
      name: Mistral Large
      context_window: 128000
      max_output_tokens: 8192
    - id: mistral-small-latest
      name: Mistral Small
      context_window: 32000
      max_output_tokens: 8192
    - id: codestral-latest
      name: Codestral
      context_window: 32000
      max_output_tokens: 8192
    - id: open-mistral-nemo
      name: Mistral Nemo
      context_window: 128000
      max_output_tokens: 8192

rate_limits:
  requests_per_minute: 60
  cooldown_on_429: 60
