schema_version: 1

adapter:
  id: brave-search
  name: Brave Search
  version: "1.0.0"
  category: search
  requires_key: true
  free_tier: true

auth:
  type: header
  header_name: X-Subscription-Token
  key_url: https://api.search.brave.com/app/keys

base_url: https://api.brave.com

endpoints:
  web_search:
    method: POST
    path: /res/v1/web/search
    response_type: json
    headers:
      Accept: application/json
      Accept-Encoding: gzip
    body:
      q: "{{ query }}"
      count: "{{ count | default: 10 }}"

  news_search:
    method: POST
    path: /res/v1/news/search
    response_type: json
    headers:
      Accept: application/json
    body:
      q: "{{ query }}"
      count: "{{ count | default: 10 }}"

  image_search:
    method: POST
    path: /res/v1/images/search
    response_type: json
    headers:
      Accept: application/json
    body:
      q: "{{ query }}"
      count: "{{ count | default: 10 }}"

capabilities:
  chat: false
  streaming: false
  embeddings: false
  images: false
  audio: false
  models:
    - id: brave-web-search
      name: Brave Web Search
    - id: brave-news-search
      name: Brave News Search

rate_limits:
  requests_per_minute: 60
  cooldown_on_429: 10
