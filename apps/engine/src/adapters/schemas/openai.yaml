schema_version: 1

adapter:
  id: openai
  name: OpenAI
  version: "1.0.0"
  category: llm
  requires_key: true
  free_tier: false

auth:
  type: bearer
  key_url: https://platform.openai.com/api-keys

base_url: https://api.openai.com

endpoints:
  chat:
    method: POST
    path: /v1/chat/completions
    response_type: json
    body:
      model: "{{ model }}"
      messages: "{{ messages }}"
      temperature: "{{ temperature | default: 0.7 }}"
      max_tokens: "{{ max_tokens | default: 4096 }}"
      stream: false

  chat_stream:
    method: POST
    path: /v1/chat/completions
    response_type: sse
    body:
      model: "{{ model }}"
      messages: "{{ messages }}"
      temperature: "{{ temperature | default: 0.7 }}"
      max_tokens: "{{ max_tokens | default: 4096 }}"
      stream: true

  embeddings:
    method: POST
    path: /v1/embeddings
    response_type: json
    body:
      model: "{{ model | default: text-embedding-3-small }}"
      input: "{{ input }}"

  models:
    method: GET
    path: /v1/models
    response_type: json

capabilities:
  chat: true
  streaming: true
  embeddings: true
  images: true
  audio: false
  models:
    - id: gpt-4o
      name: GPT-4o
      context_window: 128000
      max_output_tokens: 16384
    - id: gpt-4o-mini
      name: GPT-4o Mini
      context_window: 128000
      max_output_tokens: 16384
    - id: gpt-4-turbo
      name: GPT-4 Turbo
      context_window: 128000
      max_output_tokens: 4096

rate_limits:
  requests_per_minute: 60
  cooldown_on_429: 60
