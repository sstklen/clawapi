schema_version: 1

adapter:
  id: xai
  name: xAI (Grok)
  version: "1.0.0"
  category: llm
  requires_key: true
  free_tier: true

auth:
  type: bearer
  key_url: https://console.x.ai/

base_url: https://api.x.ai

endpoints:
  chat:
    method: POST
    path: /v1/chat/completions
    response_type: json
    body:
      model: "{{ model }}"
      messages: "{{ messages }}"
      temperature: "{{ temperature | default: 0.7 }}"
      max_tokens: "{{ max_tokens | default: 4096 }}"
      stream: false

  chat_stream:
    method: POST
    path: /v1/chat/completions
    response_type: sse
    body:
      model: "{{ model }}"
      messages: "{{ messages }}"
      temperature: "{{ temperature | default: 0.7 }}"
      max_tokens: "{{ max_tokens | default: 4096 }}"
      stream: true

  models:
    method: GET
    path: /v1/models
    response_type: json

capabilities:
  chat: true
  streaming: true
  embeddings: false
  images: false
  audio: false
  models:
    - id: grok-3
      name: Grok 3
      context_window: 131072
      max_output_tokens: 8192
    - id: grok-3-mini
      name: Grok 3 Mini
      context_window: 131072
      max_output_tokens: 8192
    - id: grok-2
      name: Grok 2
      context_window: 131072
      max_output_tokens: 8192

rate_limits:
  requests_per_minute: 60
  cooldown_on_429: 60
